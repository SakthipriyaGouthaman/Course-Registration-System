<html>
    <head>
        <title>Register Course</title>
        <style>
            body {
                background-color: black;
                text-align: center; 
            }

            form {
                margin:  auto;
                padding: 20px;
                width: 400px; 
                background-color: #fff;
            }

            input, select, button {
                width: 90%;
                padding: 10px;
                margin: 10px;
            }

            button {
                background-color: #4CAF50;
                color: white; 
                font-weight: bold;
                font-size: medium;
                cursor: pointer; 
            }

            button:hover {
                background-color: #104212; 
            }
        
        </style>

    </head>
    <body>
        <h2 style="color: yellow;">"Ready, set, learn! Dive into an awesome course."</h2>
        <form action="http://localhost:8080/courses/register" method="post">
            <label for="name">Enter your name</label><br>
            <input type="text" name="name"><br><br>
            <label for="email">Enter your Mail id</label><br>
            <input type="email" name="emailId"><br><br>
            <label for="course">Choose a course</label><br>
           <select id="course" name="courseName">
            <option value="Java fullstack">Java fullstack</option>
            <option value="Python">Python</option>
            <option value="Spring Boot">Spring Boot</option>
           </select><br>
           <br>
           <button type="submit">Submit</button>

        </form>
    </body>
</html>
